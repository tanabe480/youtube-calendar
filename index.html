<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube配信カレンダー</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
  }
</script>

<body>

<h2>YouTube 配信予定</h2>
<h3 class="addChannel">チャンネル追加</h3>
<div class="searchInputWrap">
  <input id="channelInput" placeholder="チャンネル名で検索">
  <button id="clearInputBtn" class="clearInputBtn" type="button">×</button>
</div>
<button id="searchBtn">検索</button>
<ul id="searchResult"></ul>
<h4 class="liveSchedule">配信予定一覧</h4>
<div id="liveList"></div>
<button onclick="fetchAllUpcomingLives()">更新</button>
<h5 class="addedChannel">登録済チャンネル</h5>

<ul id="channelList"></ul>

<script src="config.js"></script>
<script src="main.js"></script>

</body>

</html>
